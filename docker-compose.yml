version: '3.8'

services:
  db:
    image: postgres:17
    container_name: amas-db-local
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: amas_user
      POSTGRES_PASSWORD: amas_local_2026
      POSTGRES_DB: amas_database
    volumes:
      - amas_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U amas_user -d amas_database']
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  amas_pgdata:
